services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: guestgraph
      POSTGRES_USER: guestgraph
      POSTGRES_PASSWORD: guestgraph
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestgraph"]
      interval: 2s
      timeout: 5s
      retries: 15
