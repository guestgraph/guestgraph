spring:
  application:
    name: guestgraph
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  docker:
    compose:
      lifecycle-management: start_only

server:
  port: 8080
